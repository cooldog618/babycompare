version: '3.9'
services:
  web:
    image: node:22
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @babycompare/web dev"
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000

  api:
    image: node:22
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @babycompare/api dev"
    ports:
      - '4000:4000'
    volumes:
      - ./:/app
      - sqlite_data:/app/apps/api
    environment:
      - API_PORT=4000
      - DATABASE_URL=file:./dev.db

volumes:
  sqlite_data:
